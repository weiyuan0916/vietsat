<div class="page vs-orders-page" data-name="orders" data-url="/orders/">
    <div class="page-content" style="padding-bottom: 80px;">

        <div class="vs-header" style="padding-top: 24px;">
            <h1 class="vs-header-title">Đơn hàng của tôi</h1>
        </div>

        <div class="vs-content" style="margin-top: 16px;">
            <div id="orders-loading" class="text-align-center" style="padding: 20px;">
                <div class="preloader color-multi"></div>
                <p class="vs-text-secondary" style="margin-top:10px; font-size: 14px;">Đang tải đơn hàng...</p>
            </div>

            <div id="orders-error" class="text-align-center" style="display: none; padding: 20px;">
                <i class="icon f7-icons text-color-red" style="font-size: 32px;">exclamationmark_triangle_fill</i>
                <p class="vs-text-secondary" style="margin-top:10px; font-size: 14px;">Không thể tải đơn hàng</p>
                <button class="button vs-btn-primary"
                    style="margin-top:16px; width:120px; font-size:14px; height:40px; margin-left:auto; margin-right:auto;"
                    onclick="retryLoadOrders()">
                    <i class="icon f7-icons" style="font-size: 16px;">arrow_clockwise</i> Thử lại
                </button>
            </div>

            <div id="orders-empty" class="text-align-center" style="display: none; padding: 20px;">
                <p class="vs-text-secondary" style="font-size: 14px;">Không có đơn hàng</p>
                <a href="/service/" class="button vs-btn-primary" style="margin-top: 12px; width: 180px; margin-left:auto; margin-right:auto;">
                    Mua hàng
                </a>
            </div>

            <div id="orders-list" style="display: none;"></div>
        </div>
    </div>
</div>
