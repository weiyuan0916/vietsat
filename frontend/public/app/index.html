<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#ffffff">
    <title>Vietnam Satellite</title>
    <link rel="stylesheet" href="css/framework7-bundle.min.css">
    <link rel="stylesheet" href="css/framework7-icons.css">
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body class="color-blue">
    <div id="app">
      <!-- Views -->
      <div class="views">
        <div class="view view-main" id="view-home">
          <div class="pages"></div>
        </div>
        <div class="view" id="view-service">
          <div class="pages"></div>
        </div>
        <div class="view" id="view-profile">
          <div class="pages"></div>
        </div>
      </div>
      <!-- Tabbar -->
      <div class="toolbar tabbar tabbar-icons toolbar-bottom">
        <div class="toolbar-inner">
          <a href="#view-home" class="tab-link tab-link-active">
            <i class="icon f7-icons">house_fill</i>
            <span class="tabbar-label">Home</span>
          </a>
          <a href="#view-service" class="tab-link">
            <i class="icon f7-icons">creditcard_fill</i>
            <span class="tabbar-label">Service</span>
          </a>
          <a href="#view-profile" class="tab-link">
            <i class="icon f7-icons">person_crop_circle_fill</i>
            <span class="tabbar-label">Profile</span>
          </a>
        </div>
      </div>
    </div>
    <script src="js/framework7-bundle.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
