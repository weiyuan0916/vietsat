<div class="page vs-cart-page vs-detail-page" data-name="cart" data-url="/cart/">
    <div class="page-content">

        <!-- Header -->
        <div class="vs-header" style="padding-top: 24px;">
            <a href="#" class="link icon-only vs-header-btn cart-back-btn">
                <i class="icon f7-icons">chevron_left</i>
            </a>
            <h1 class="vs-header-title" style="position: absolute; left: 50%; transform: translateX(-50%);">Giỏ hàng</h1>
            <a href="#" class="link vs-text-secondary" style="font-size: 14px; font-weight: 500; margin-left: auto;" id="cart-clear-btn"
                onclick="clearCart(); return false;">Xoá tất cả</a>
        </div>

        <!-- Cart Items -->
        <div class="vs-content vs-cart-items-container" style="padding-top: 8px; flex: 1; min-height: 0;">

            <!-- Loading -->
            <div id="cart-loading" class="text-align-center" style="padding: 40px;">
                <div class="preloader color-multi"></div>
                <p class="vs-text-secondary" style="margin-top:10px; font-size: 14px;">Đang tải...</p>
            </div>

            <!-- Empty State -->
            <div id="cart-empty" style="display: none; text-align: center; padding: 60px 20px;">
                <div
                    style="width: 80px; height: 80px; border-radius: 20px; background: #F4F4F5; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;">
                    <i class="icon f7-icons" style="font-size: 36px; color: #A1A1AA;">cart</i>
                </div>
                <h3 style="font-family: var(--vs-font-heading); font-weight: 700; font-size: 18px; margin: 0 0 8px 0;">
                    Giỏ hàng trống</h3>
                <p class="vs-text-secondary" style="font-size: 14px; margin: 0 0 24px 0;">Hãy thêm dịch vụ bạn muốn đăng
                    ký</p>
                <a href="#" class="button vs-btn-primary"
                    style="width: 180px; margin: 0 auto; height: 44px; font-size: 14px;"
                    onclick="goBack(); setTimeout(function(){ switchTab('services', null); }, 100); return false;">
                    <i class="icon f7-icons" style="font-size: 16px;">tv</i>
                    <span>Xem dịch vụ</span>
                </a>
            </div>

            <!-- Items List -->
            <div id="cart-items-list" style="display: none;"></div>
        </div>

    </div>

    <!-- Bottom Bar - Pinned above Tab Bar -->
    <div class="vs-cart-bottom-bar" id="cart-bottom-bar" style="display: none;">
        <div class="vs-cart-summary">
            <div class="vs-cart-summary-row">
                <span class="vs-text-secondary" style="font-size: 16px;">Tổng cộng</span>
                <span
                    style="font-family: var(--vs-font-heading); font-size: 20px; font-weight: 800; color: var(--vs-accent);"
                    id="cart-total-price">0đ</span>
            </div>
        </div>
        <a href="#" class="button vs-btn-primary vs-cart-checkout-btn" onclick="checkoutCart(); return false;">
            <i class="icon f7-icons" style="font-size: 18px;">creditcard</i>
            <span>Thanh toán</span>
        </a>
    </div>
</div>
