<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="stylesheet" href="styles.css" />
    <title>Mở UID Facebook</title>
  </head>
  <body>
    <div class="container">
      <h2>Mở UID Facebook</h2>
      <label for="profileUrl">URL hồ sơ</label>
      <input id="profileUrl" type="text" placeholder="https://www.facebook.com/username_or_id" />
      <button id="submitBtn">Gửi</button>
      <div id="status" class="status"></div>
      <div id="result" class="result"></div>
      <small class="note">Mở liên kết nhóm và tự động đóng tab sau 5 phút.</small>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
