name: CI Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Cache Composer deps
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-progress --no-suggest --prefer-dist --no-interaction

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend (esbuild)
        run: npm run esbuild:build

      - name: Run Laravel optimizations
        run: |
          php artisan view:clear
          php artisan cache:clear
          php artisan config:cache || true

      - name: Run PHP unit tests (if present)
        if: runner.os == 'Linux'
        run: |
          if [ -f phpunit.xml ] || [ -f phpunit.xml.dist ]; then
            composer require --dev phpunit/phpunit --no-interaction --no-progress || true
            ./vendor/bin/phpunit --colors=always || true
          else
            echo "No phpunit configuration found, skipping tests."
          fi

      - name: Upload built assets
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: |
            public/css/main.css
            public/js/main.js
            public/build/**

  checklist:
    name: Post-check
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Done
        run: echo "Build finished. Use artifacts or add deploy step that uses secrets (SSH deploy, FTP, etc.)."

  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      DEPLOY_POST_CMD: ${{ secrets.DEPLOY_POST_CMD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: .

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ env.SSH_PRIVATE_KEY }}

      - name: Rsync files to remote
        run: |
          PORT="${DEPLOY_PORT:-22}"
          echo "Syncing to ${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH} (port $PORT)"
          rsync -avz --delete -e "ssh -p $PORT -o StrictHostKeyChecking=no" ./public/ "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}"

      - name: Run post-deploy commands on remote (optional)
        if: env.DEPLOY_POST_CMD != ''
        run: |
          PORT="${DEPLOY_PORT:-22}"
          ssh -p $PORT -o StrictHostKeyChecking=no ${DEPLOY_USER}@${DEPLOY_HOST} "${DEPLOY_POST_CMD}"


