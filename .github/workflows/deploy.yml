name: Deploy to Vietnix

on:
  push:
    branches: [main]
    paths:
      - 'pwa-ecommerce/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'production'
        type: choice
        options:
          - production
      skip_migration:
        description: 'Skip database migration'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  PHP_VERSION: '8.3'
  PWA_DIR: 'pwa-ecommerce'

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.PWA_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          coverage: none
          extensions: mbstring, xml, bcmath, curl, zip, pdo_mysql

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.PWA_DIR }}/vendor
          key: composer-${{ runner.os }}-${{ hashFiles('${{ env.PWA_DIR }}/composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-

      - name: Install Composer dependencies
        run: composer install --no-progress --no-suggest --prefer-dist --no-interaction --optimize-autoloader

      - name: Copy environment file
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
            echo "APP_ENV=production" >> .env
            echo "APP_DEBUG=false" >> .env
            echo "LOG_CHANNEL=error_log" >> .env
          fi

      - name: Generate application key
        run: php artisan key:generate --force

      - name: Run PHPUnit tests
        if: runner.os == 'Linux'
        run: |
          if [ -f phpunit.xml ] || [ -f phpunit.xml.dist ]; then
            ./vendor/bin/phpunit --colors=never || echo "Tests completed"
          else
            echo "No phpunit configuration found, skipping tests"
          fi

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    environment:
      name: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - name: Create deployment info
        run: |
          echo "DEPLOY_TIME=$(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_ENV
          echo "DEPLOY_COMMIT=$(git log -1 --pretty=format:'%H')" >> $GITHUB_ENV
          echo "DEPLOY_BRANCH=${{ github.ref_name }}" >> $GITHUB_ENV

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"

            echo "=== Deployment started ==="
            echo "Deploy path: $DEPLOY_PATH"

            cd "$DEPLOY_PATH"

            # Backup .env if exists
            mkdir -p backups
            if [ -f .env ]; then
              cp .env "backups/env_$(date +%Y%m%d_%H%M%S).bak"
              ls -t backups/env_*.bak | tail -n +6 | xargs -r rm
            fi

            # Git pull latest code
            echo "Fetching latest changes..."
            git fetch origin main
            git reset --hard origin/main

            # Restore .env from latest backup
            if [ -f "backups/latest.env.bak" ]; then
              cp backups/latest.env.bak .env
            fi

            echo "Installing PHP dependencies..."
            composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist --no-scripts

            echo "Clearing caches after composer install..."
            rm -f bootstrap/cache/config.php
            rm -f bootstrap/cache/routes.php
            php artisan config:clear || true
            php artisan cache:clear || true
            php artisan filament:upgrade || true

            echo "Installing npm dependencies..."
            npm ci

            echo "Building frontend assets..."
            npm run esbuild:build

            if [ "${{ github.event.inputs.skip_migration }}" != "true" ]; then
              echo "Running migrations..."
              php artisan migrate --force --no-interaction
            fi

            echo "Clearing caches..."
            rm -f bootstrap/cache/*.php
            php artisan config:clear || true
            php artisan route:clear || true
            php artisan view:clear || true
            php artisan cache:clear || true

            echo "Building caches..."
            php artisan config:cache
            php artisan route:cache

            echo "Setting permissions..."
            chmod -R 755 storage bootstrap/cache
            chmod 644 .env

            php artisan optimize

            echo "=== Deployment completed ==="

      - name: Telegram Success Notification
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            **🚀 Deploy thành công!**
            
            **Dự án:** vietsat
            **Môi trường:** ${{ github.event.inputs.environment || 'production' }}
            **Branch:** main
            **Commit:** `${{ env.DEPLOY_COMMIT }}`
            **Time:** ${{ env.DEPLOY_TIME }}
            
            ✅ Deploy lên Vietnix thành công

      - name: Telegram Failure Notification
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            **❌ Deploy thất bại!**
            
            **Dự án:** vietsat
            **Môi trường:** ${{ github.event.inputs.environment || 'production' }}
            
            Vui lòng kiểm tra GitHub Actions logs.
            
            🔗 [Xem chi tiết](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

  cleanup:
    name: Cleanup
    runs-on: ubuntu-latest
    needs: deploy
    if: always() && needs.deploy.result == 'success'

    steps:
      - name: Cleanup old backups
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd "${{ secrets.DEPLOY_PATH }}"
            ls -t backups/env_*.bak | tail -n +11 | xargs -r rm 2>/dev/null || true
            find storage/logs -name "*.log" -type f -mtime +7 -delete 2>/dev/null || true
